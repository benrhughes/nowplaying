services:
  nowplaying:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nowplaying
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:${PORT}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

