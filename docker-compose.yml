version: '3.8'

services:
  bcmasto:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bcmasto
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - PORT=5000
      # Set your Mastodon instance redirect URI (update for your domain)
      - REDIRECT_URI=http://localhost:5000/auth/callback
      # Use a strong session secret in production - change this!
      - SESSION_SECRET=${SESSION_SECRET:-change-this-to-a-strong-random-secret}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bcmasto-network

networks:
  bcmasto-network:
    driver: bridge

